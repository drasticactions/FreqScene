name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    # Skip a build when a push touches ONLY these (docs, non-code). Any other
    # changed path — source, csproj, native/pack scripts, this workflow — builds.
    # Note: paths-ignore does not apply to tag pushes (v* always builds a release)
    # or to workflow_dispatch (manual runs always build).
    paths-ignore:
      - '**/*.md'
      - 'LICENSE.txt'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE.txt'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR (but let tag builds finish).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  macos:
    name: macOS (universal, adhoc-signed)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve tag version
        id: tagver
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle (universal, NativeAOT, ad-hoc signed)
        run: |
          eng/pack/build-macos-app.sh \
            --sign adhoc \
            --arch universal \
            --aot \
            --version "${VERSION}"
        env:
          VERSION: ${{ steps.tagver.outputs.version || '1.0.0' }}

      - uses: actions/upload-artifact@v4
        with:
          name: freqscene-macos-universal
          path: artifacts/pack/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  linux:
    name: Linux x64 (AppImage)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential patchelf zsync \
            clang zlib1g-dev imagemagick \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Resolve tag version
        id: tagver
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build AppImage (NativeAOT)
        # APPIMAGE_EXTRACT_AND_RUN lets the appimagetool AppImage run without FUSE,
        # which GitHub-hosted runners do not provide.
        run: |
          eng/pack/build-linux-appimage.sh \
            --arch x64 \
            --aot \
            --version "${VERSION}"
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          VERSION: ${{ steps.tagver.outputs.version || '1.0.0' }}

      - uses: actions/upload-artifact@v4
        with:
          name: freqscene-linux-x64
          path: |
            artifacts/pack/*.AppImage
            artifacts/pack/*.zsync
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  windows:
    name: Windows x64 (AOT zip)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve tag version
        id: tagver
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build Windows zip (NativeAOT)
        shell: pwsh
        run: |
          eng/pack/build-windows-zip.ps1 -Arch x64 -Version $env:VERSION
        env:
          VERSION: ${{ steps.tagver.outputs.version || '1.0.0' }}

      - uses: actions/upload-artifact@v4
        with:
          name: freqscene-windows-x64
          path: artifacts/pack/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # FreqScene.Tui — the headless/terminal head. Shipped as a NativeAOT binary in a
  # plain archive: no app bundle, no AppImage, and no native libprojectM (the TUI
  # never creates a ProjectM instance), so these jobs need no CMake toolchain and
  # skip the (large) external/projectm submodule. They still need external/MagicOnion,
  # which FreqScene.Remote* consume as ProjectReferences — hence the targeted init
  # below instead of `submodules: recursive` on checkout.
  tui-macos:
    name: TUI macOS (universal, adhoc-signed)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check out MagicOnion submodule
        run: git submodule update --init external/MagicOnion

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve tag version
        id: tagver
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build TUI tarball (universal, NativeAOT, ad-hoc signed)
        run: eng/pack/build-tui.sh --os macos --arch universal --version "${VERSION}"
        env:
          VERSION: ${{ steps.tagver.outputs.version || '1.0.0' }}

      - uses: actions/upload-artifact@v4
        with:
          name: freqscene-tui-macos-universal
          path: artifacts/pack/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  tui-linux:
    name: TUI Linux x64 (AOT tarball)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check out MagicOnion submodule
        run: git submodule update --init external/MagicOnion

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install NativeAOT build dependencies
        # NativeAOT links with clang against zlib; no CMake/GL packages needed
        # here because the TUI ships no native libprojectM.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang zlib1g-dev

      - name: Resolve tag version
        id: tagver
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build TUI tarball (NativeAOT)
        run: eng/pack/build-tui.sh --os linux --arch x64 --version "${VERSION}"
        env:
          VERSION: ${{ steps.tagver.outputs.version || '1.0.0' }}

      - uses: actions/upload-artifact@v4
        with:
          name: freqscene-tui-linux-x64
          path: artifacts/pack/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  tui-windows:
    name: TUI Windows x64 (AOT zip)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Check out MagicOnion submodule
        run: git submodule update --init external/MagicOnion

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve tag version
        id: tagver
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build TUI zip (NativeAOT)
        shell: pwsh
        run: |
          eng/pack/build-tui.ps1 -Arch x64 -Version $env:VERSION
        env:
          VERSION: ${{ steps.tagver.outputs.version || '1.0.0' }}

      - uses: actions/upload-artifact@v4
        with:
          name: freqscene-tui-windows-x64
          path: artifacts/pack/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # On a v* tag, gather every platform's artifacts and publish a GitHub Release.
  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, linux, windows, tui-macos, tui-linux, tui-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            $(find dist -type f | sort)
